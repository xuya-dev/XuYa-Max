services:
  mysql:
    image: mysql:8.4.9
    container_name: mysql
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      # root 密码
      MYSQL_ROOT_PASSWORD: root
      # 初始化数据库(后续的初始化sql会在这个库执行)
      MYSQL_DATABASE: ry-vue
    ports:
      - "3306:3306"
    volumes:
      # 数据挂载
      - /docker/mysql/data/:/var/lib/mysql/
      # 配置挂载
      - /docker/mysql/conf/:/etc/mysql/conf.d/
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --explicit_defaults_for_timestamp=true
      --lower_case_table_names=1
    privileged: true
    network_mode: "host"

  nginx-web:
    image: nginx:1.31.1
    container_name: nginx-web
    environment:
      # 时区上海
      TZ: Asia/Shanghai
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 证书映射
      - /docker/nginx/cert:/etc/nginx/cert
      # 配置文件映射
      - /docker/nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      # 页面目录
      - /docker/nginx/html:/usr/share/nginx/html
      # 日志目录
      - /docker/nginx/log:/var/log/nginx
    privileged: true
    network_mode: "host"

  redis:
    image: redis:8.6.3
    container_name: redis
    ports:
      - "6379:6379"
    environment:
      # 时区上海
      TZ: Asia/Shanghai
    volumes:
      # 配置文件
      - /docker/redis/conf:/redis/config:rw
      # 数据文件
      - /docker/redis/data/:/redis/data/:rw
    command: "redis-server /redis/config/redis.conf"
    privileged: true
    network_mode: "host"

  minio:
    # pgsty 开源社区 fork 重新维护的最新版 minio
    image: pgsty/minio:RELEASE.2026-04-17T00-00-00Z
    container_name: minio
    ports:
      # api 端口
      - "9000:9000"
      # 控制台端口
      - "9001:9001"
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      # 管理后台用户名
      MINIO_ROOT_USER: xuya-max
      # 管理后台密码，最小8个字符
      MINIO_ROOT_PASSWORD: xuya-max123
      # https需要指定域名
      #MINIO_SERVER_URL: "https://xxx.com:9000"
      #MINIO_BROWSER_REDIRECT_URL: "https://xxx.com:9001"
      # 开启压缩 on 开启 off 关闭
      MINIO_COMPRESS: "off"
      # 扩展名 .pdf,.doc 为空 所有类型均压缩
      MINIO_COMPRESS_EXTENSIONS: ""
      # mime 类型 application/pdf 为空 所有类型均压缩
      MINIO_COMPRESS_MIME_TYPES: ""
    volumes:
      # 映射当前目录下的data目录至容器内/data目录
      - /docker/minio/data:/data
      # 映射配置目录
      - /docker/minio/config:/root/.minio/
    command: server --address ':9000' --console-address ':9001' /data  # 指定容器中的目录 /data
    privileged: true
    network_mode: "host"

  xuya-max-server1:
    image: xuya-max/xuya-max-server:6.0.0
    container_name: xuya-max-server1
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      SERVER_PORT: 8080
      SNAIL_JOB_PORT: 28080
      SNAIL_AI_PORT: 38080
    volumes:
      # 配置文件
      - /docker/server1/logs/:/xuya-max/server/logs/
      # skywalking 探针
#      - /docker/skywalking/agent/:/xuya-max/skywalking/agent
    privileged: true
    network_mode: "host"

  xuya-max-server2:
    image: xuya-max/xuya-max-server:6.0.0
    container_name: xuya-max-server2
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      SERVER_PORT: 8081
      SNAIL_JOB_PORT: 28081
      SNAIL_AI_PORT: 38081
    volumes:
      # 配置文件
      - /docker/server2/logs/:/xuya-max/server/logs/
      # skywalking 探针
#      - /docker/skywalking/agent/:/xuya-max/skywalking/agent
    privileged: true
    network_mode: "host"

  xuya-max-snailjob-server:
    image: xuya-max/xuya-max-snailjob-server:6.0.0
    container_name: xuya-max-snailjob-server
    environment:
      # 时区上海
      TZ: Asia/Shanghai
    ports:
      - "8800:8800"
      - "17888:17888"
    volumes:
      - /docker/snailjob/logs/:/xuya-max/snailjob/logs
    privileged: true
    network_mode: "host"
